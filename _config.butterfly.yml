# Navigation
nav:
  logo:
  display_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open

# Code Blocks
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_height_limit: 300

# Social
social:
  fab fa-github: https://github.com/PeterGuy326 || Github

# Avatar
avatar:
  img: https://avatars.githubusercontent.com/u/47820304?v=4
  effect: true

# Aside
aside:
  enable: true
  card_author:
    enable: true
    description: 幸好有你雯
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/PeterGuy326
  card_announcement:
    enable: true
    content: 记录学习，分享成长
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
  card_tags:
    enable: true
    limit: 20
  card_archives:
    enable: true
    limit: 6

# Footer
footer:
  owner:
    enable: true
    since: 2022
  custom_text: <a target="_blank" rel="noopener" href="https://github.com/PeterGuy326">PeterGuy326</a>
  copyright: true

# Post
post_meta:
  page:
    date_type: created
    categories: true
    tags: true
  post:
    date_type: both
    categories: true
    tags: true

toc:
  post: true
  page: false
  number: true

# Post Copyright
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/PeterGuy326
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Theme color
theme_color:
  enable: true
  main: "#49B1F5"

# Beautify
beautify:
  enable: true
  field: post
  title-prefix-icon: '\f0c1'
  title-prefix-icon-color: "#F47466"

# Font
font:
  global-font-size:
  code-font-size:
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif
  code-font-family: consolas, Menlo, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# Local search
local_search:
  enable: true
  preload: false
  top_n_per_article: 1
  unescape: false
  CDN:

# Index page - use Unsplash images for top banners
index_img: https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1600&h=600&fit=crop
default_top_img: https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=1600&h=600&fit=crop
archive_img: https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1600&h=400&fit=crop
tag_img: https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1600&h=400&fit=crop
category_img: https://images.unsplash.com/photo-1504639725590-34d0984388bd?w=1600&h=400&fit=crop

# Post cover
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:
    - https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=800&h=500&fit=crop
    - https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=800&h=500&fit=crop
    - https://images.unsplash.com/photo-1516116216624-53e697fedbea?w=800&h=500&fit=crop
    - https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=800&h=500&fit=crop
    - https://images.unsplash.com/photo-1518432031352-d6fc5c10da5a?w=800&h=500&fit=crop

# Page transition
enter_transitions: true

# Preloader
preloader:
  enable: true
  source: 1

# Wordcount (if plugin installed)
wordcount:
  enable: false

# Subtitle on index page
subtitle:
  enable: true
  effect: true
  typed_option:
    loop: true
    typeSpeed: 100
    backSpeed: 50
  source: 1
  sub:
    - 学无止境，知行合一
    - Stay hungry, stay foolish
    - Code is poetry
