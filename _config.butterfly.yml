# Navigation
nav:
  logo:
  display_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open

# Code Blocks
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_height_limit: 300

# Social
social:
  fab fa-github: https://github.com/PeterGuy326 || Github

# Avatar
avatar:
  img: https://avatars.githubusercontent.com/u/47820304?v=4
  effect: true

# Aside
aside:
  enable: true
  card_author:
    enable: true
    description: Debug the world, one line at a time.
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/PeterGuy326
  card_announcement:
    enable: true
    content: 欢迎来到 Peter の 技术小屋！这里记录后端开发的点滴~
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
  card_tags:
    enable: true
    limit: 20
  card_archives:
    enable: true
    limit: 6

# Footer
footer:
  owner:
    enable: true
    since: 2022
  custom_text: |
    Powered by <a target="_blank" rel="noopener" href="https://hexo.io/">Hexo</a> & <a target="_blank" rel="noopener" href="https://github.com/jerryc127/hexo-theme-butterfly">Butterfly</a><br>
    <i class="fas fa-heart" style="color:#ff6b81"></i> Keep coding, keep learning
  copyright: true

# Post
post_meta:
  page:
    date_type: created
    categories: true
    tags: true
  post:
    date_type: both
    categories: true
    tags: true

toc:
  post: true
  page: false
  number: true

# Post Copyright
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/PeterGuy326
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Theme color
theme_color:
  enable: true
  main: "#49B1F5"

# Beautify
beautify:
  enable: true
  field: post
  title-prefix-icon: '\f0c1'
  title-prefix-icon-color: "#F47466"

# Font
font:
  global-font-size:
  code-font-size:
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif
  code-font-family: consolas, Menlo, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# Local search
local_search:
  enable: true
  preload: false
  top_n_per_article: 1
  unescape: false
  CDN:

# Index page - custom cover
# 站点级 banner：宝可梦官方艺术图（PokéAPI 官方 sprite 仓库，稳定 GitHub raw CDN）
# 25=皮卡丘  150=超梦  6=喷火龙  448=路卡利欧  493=阿尔宙斯
index_img: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png
default_top_img: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png
archive_img: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/249.png
tag_img: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/448.png
category_img: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/493.png

# Post cover
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  # 宝可梦官方艺术图随机池
  # 数据源：PokéAPI 官方 sprite 仓库（GitHub raw，稳定 CDN，高清透明 PNG，475x475）
  # https://github.com/PokeAPI/sprites
  # 涵盖：1-9 代御三家 + 国民级宝可梦 + 传说/神兽 + 高人气进化型，共 30 只
  default_cover:
    # ── 一代御三家 + 终极进化 + 皮神 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png    # 妙蛙种子
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png    # 小火龙
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png    # 喷火龙
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png    # 杰尼龟
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png    # 水箭龟
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png   # 皮卡丘
    # ── 一代国民 + 神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png   # 耿鬼
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/130.png  # 暴鲤龙
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png  # 伊布
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png  # 卡比兽
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/149.png  # 快龙
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png  # 超梦
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/151.png  # 梦幻
    # ── 二代经典 + 神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/196.png  # 太阳精灵
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/197.png  # 月亮精灵
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/248.png  # 班基拉斯
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/249.png  # 洛奇亚
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/250.png  # 凤王
    # ── 三代神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/384.png  # 烈空坐
    # ── 四代御三家终极进化 + 神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/445.png  # 烈咬陆鲨
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/448.png  # 路卡利欧
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/487.png  # 骑拉帝纳
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/493.png  # 阿尔宙斯
    # ── 五代神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/643.png  # 莱希拉姆
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/644.png  # 捷克罗姆
    # ── 六代神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/716.png  # 哲尔尼亚斯
    # ── 七代神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/800.png  # 奈克洛兹玛
    # ── 八代神兽 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/890.png  # 无极汰那
    # ── 九代御三家终极进化 ──
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/908.png  # 庆祝之歌
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/911.png  # 骨纹巨声鳄
    - https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/914.png  # 朱红蓝鹂

# Page transition
enter_transitions: true

# Inject custom CSS/JS
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:

# Preloader
preloader:
  enable: true
  source: 1

# Wordcount (if plugin installed)
wordcount:
  enable: false

# Subtitle on index page
subtitle:
  enable: true
  effect: true
  typed_option:
    loop: true
    typeSpeed: 100
    backSpeed: 50
  source: 1
  sub:
    - 学无止境，知行合一
    - Stay hungry, stay foolish
    - Code is poetry
